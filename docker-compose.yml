version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: finance_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U finance_user -d finance_tracker" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finance_tracker_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finance_user:finance123@db:5432/finance_tracker
      JWT_SECRET: finance-tracker-super-secret-key-2026
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
