version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finance_tracker_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: finance_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finance_tracker_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: finance_tracker_app_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finance_user:finance123@db:5432/finance_tracker
      REDIS_URL: redis://redis:6379
      JWT_SECRET: finance-tracker-super-secret-key-2026
      JWT_EXPIRES_IN: 7d
      ACCESS_TOKEN_EXPIRES_IN: 15m # ← ADD
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./src:/app/src
    command: npx nodemon src/index.js
    depends_on:
      - db
      - redis

volumes:
  postgres_dev_data:
  redis_data:
