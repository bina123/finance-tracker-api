version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finance_tracker_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: finance_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: finance_tracker_app_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finance_user:finance123@db:5432/finance_tracker
      JWT_SECRET: finance-tracker-super-secret-key-2026
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
    volumes:
      - ./src:/app/src
    command: npm run dev
    depends_on:
      - db

volumes:
  postgres_dev_data:
