name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # Job 1 — Run Tests
  # ================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finance_user
          POSTGRES_PASSWORD: finance123
          POSTGRES_DB: finance_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://finance_user:finance123@localhost:5432/finance_tracker_test

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://finance_user:finance123@localhost:5432/finance_tracker_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://finance_user:finance123@localhost:5432/finance_tracker_test
          JWT_SECRET: test-secret-key
          JWT_EXPIRES_IN: 7d
          PORT: 3000

  # ================================
  # Job 2 — Build Docker Image
  # ================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t finance-tracker-api:latest .
          echo "Docker image built successfully"

      - name: Test Docker image starts
        run: |
          docker run -d \
            --name test_container \
            -e DATABASE_URL="postgresql://test:test@localhost:5432/test" \
            -e JWT_SECRET="test-secret" \
            -e JWT_EXPIRES_IN="7d" \
            -p 3000:3000 \
            finance-tracker-api:latest
          sleep 5
          docker logs test_container
          docker stop test_container